name: Deploy Sanity Studio

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx sanity deploy -y --url parfume-adilbek
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
