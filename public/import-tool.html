function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

async function uploadImage(projectId, dataset, token, imageUrl) {
  const imgRes = await fetch(imageUrl);
  if (!imgRes.ok) throw new Error('не скачалось фото: ' + imgRes.status);
  const blob = await imgRes.blob();
  const uploadUrl = `https://${projectId}.api.sanity.io/v2024-01-01/assets/images/${dataset}`;
  const res = await fetch(uploadUrl, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': blob.type || 'image/jpeg',
    },
    body: blob,
  });
  const data = await res.json();
  if (!res.ok) throw new Error('не загрузилось в Sanity: ' + JSON.stringify(data));
  return data.document._id;
}

document.getElementById('go').addEventListener('click', async () => {
  const projectId = document.getElementById('projectId').value.trim();
  const dataset = document.getElementById('dataset').value.trim();
  const token = document.getElementById('token').value.trim();
  if (!projectId || !dataset || !token) { alert('Заполни все три поля'); return; }
  document.getElementById('go').disabled = true;

  const mutations = [];
  let okPhotos = 0, failPhotos = 0;

  for (let i = 0; i < PRODUCTS.length; i++) {
    const p = { ...PRODUCTS[i] };
    const photoUrl = p._photoUrl;
    delete p._photoUrl;
    log(`[${i+1}/${PRODUCTS.length}] ${p.name} — обработка...`);

    if (photoUrl) {
      try {
        const assetId = await uploadImage(projectId, dataset, token, photoUrl);
        p.image = { _type: 'image', asset: { _type: 'reference', _ref: assetId } };
        okPhotos++;
      } catch (e) {
        log('   фото не загрузилось (' + e.message + '), товар всё равно добавлю без фото');
        failPhotos++;
      }
    }
    mutations.push({ createOrReplace: p });
  }

  log('Отправляю все товары в базу...');
  const url = `https://${projectId}.api.sanity.io/v2024-01-01/data/mutate/${dataset}`;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ mutations }),
    });
    const data = await res.json();
    if (!res.ok) {
      log('ОШИБКА: ' + res.status);
      log(JSON.stringify(data, null, 2));
    } else {
      log('ГОТОВО! Товаров загружено: ' + mutations.length);
      log('Фото загружено успешно: ' + okPhotos + ', не удалось: ' + failPhotos);
    }
  } catch (e) {
    log('Ошибка сети: ' + e.message);
    log('Если это CORS — открой эту страницу с реального сайта (не file://), и добавь его адрес в Sanity → API → CORS origins.');
  }
  document.getElementById('go').disabled = false;
});
